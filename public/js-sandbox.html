<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<style>
body { margin: 0; overflow: hidden; background: #000; }
canvas { display: block; }
#output { color: #fff; font-family: monospace; padding: 8px; }
</style>
</head>
<body>
<canvas id="c" width="640" height="400"></canvas>
<div id="output"></div>
<script>
const LIBS = {
  three: "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js",
  p5: "https://cdn.jsdelivr.net/npm/p5@1.9.0/lib/p5.min.js",
  d3: "https://cdn.jsdelivr.net/npm/d3@7.8.5/dist/d3.min.js",
  plotly: "https://cdn.jsdelivr.net/npm/plotly.js@2.27.1/dist/plotly.min.js",
  matter: "https://cdn.jsdelivr.net/npm/matter-js@0.19.0/build/matter.min.js",
  anime: "https://cdn.jsdelivr.net/npm/animejs@3.2.1/lib/anime.min.js",
  mermaid: "https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"
};

async function loadLib(name) {
  const url = LIBS[name];
  if (!url) return;
  await new Promise((res, rej) => {
    const s = document.createElement("script");
    s.src = url;
    s.onload = res;
    s.onerror = rej;
    document.head.appendChild(s);
  });
}

window.addEventListener("message", async (e) => {
  if (!e.data || e.data.type !== "run") return;
  const { code, libraries = [], id } = e.data;
  try {
    for (const lib of libraries) await loadLib(lib);
    await new Function("canvas", "output", code)(
      document.getElementById("c"),
      document.getElementById("output")
    );
    parent.postMessage({ type: "done", id }, "*");
  } catch (err) {
    parent.postMessage({ type: "error", id, payload: String(err) }, "*");
  }
});
</script>
</body>
</html>
